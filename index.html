<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeOne 代理</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: #f5f7fa;
      color: #1f2937;
    }

    main {
      width: min(92vw, 640px);
      padding: 2rem;
      border-radius: 1rem;
      background: white;
      box-shadow: 0 12px 40px rgb(15 23 42 / 12%);
    }

    h1 {
      margin-top: 0;
    }

    form {
      display: flex;
      gap: 0.75rem;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      font: inherit;
    }

    button {
      padding: 0.75rem 1.25rem;
      border: 0;
      border-radius: 0.5rem;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font: inherit;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #111827;
        color: #f9fafb;
      }

      main {
        background: #1f2937;
      }

      input {
        border-color: #4b5563;
        background: #111827;
        color: inherit;
      }
    }

    @media (max-width: 520px) {
      form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>EdgeOne 代理</h1>
    <p>输入目标网址，通过 Edge Function 转发请求。</p>
    <form id="proxy-form">
      <input id="target-url" type="url" placeholder="https://example.com" required>
      <button type="submit">打开</button>
    </form>
  </main>

  <script>
    function redirectToProxy(event) {
      event.preventDefault();
      const targetUrl = document.getElementById('target-url').value.trim();
      if (targetUrl) {
        const proxyUrl = '/proxy?url=' + encodeURIComponent(targetUrl);
        window.open(proxyUrl, '_blank');
      }
    }

    document.getElementById('proxy-form').addEventListener('submit', redirectToProxy);
  </script>
</body>
</html>
