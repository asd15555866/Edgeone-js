*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;color:#1f1f1f;min-height:100vh;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;justify-content:flex-end;padding:6px 14px;gap:4px;font-size:13px;position:relative;z-index:1}
.nav a{color:#1f1f1f;text-decoration:none;padding:8px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.nav a:hover{background:#f0f0f0}

.nav .apps:hover{background:#f0f0f0}
.nav .signin{background:#1a73e8;color:#fff;padding:9px 23px;border-radius:4px;font-weight:500;font-size:14px;text-decoration:none}
.nav .signin:hover{background:#1557b0;text-decoration:none}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;margin-top:-10vh}
.logo{margin-bottom:1.5rem}
.search-wrap{width:100%;max-width:584px}
.search-box{display:flex;align-items:center;border:1px solid #dfe1e5;border-radius:24px;padding:0 14px;height:46px;transition:box-shadow .2s,border-color .2s}
.search-box:hover,.search-box:focus-within{border-color:transparent;box-shadow:0 1px 6px rgba(32,33,36,.28)}
.search-box .prefix{color:#70757a;font-size:13px;flex-shrink:0;font-family:'SF Mono',Consolas,monospace;padding-right:4px}
.search-box input{flex:1;background:0 0;border:none;outline:0;color:#1f1f1f;font-size:16px;height:100%}
.search-box input::placeholder{color:#70757a;font-size:16px}
.search-box .right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.search-box .icon-btn{background:0 0;border:none;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:#5f6368;transition:background .15s}
.search-box .icon-btn:hover{background:#f0f0f0}
.search-box .divider{width:1px;height:28px;background:#dadce0;margin:0 4px;flex-shrink:0}

.shortcuts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:1.5rem;max-width:584px}
.shortcuts a{padding:4px 10px;border-radius:4px;color:#5f6368;text-decoration:none;font-size:13px}
.shortcuts a:hover{color:#1f1f1f;background:#f2f2f2}

.footer a{color:#70757a;text-decoration:none;padding:0 8px}
.footer a:hover{color:#1f1f1f}
.footer-left .tooltip-trigger{cursor:help;border-bottom:1px dashed #70757a}
.footer-left .tooltip-trigger .tooltip-text{visibility:hidden;opacity:0;position:fixed;background:#1f1f1f;color:#fff;font-size:12px;padding:6px 12px;border-radius:6px;white-space:nowrap;pointer-events:none;transition:opacity .15s;z-index:9999}
.footer-left .tooltip-trigger .tooltip-text.show{visibility:visible;opacity:1}

<script>
function go(){var v=document.getElementById('domainInput').value.trim();if(v){var p=v.startsWith('http')?'/'+v.replace(/https?:\/\//,''):v;location.href='/'+p}}
function aiSearch(){var v=document.getElementById('domainInput').value.trim();if(v){var p=v.startsWith('http')?'/'+v.replace(/https?:\/\//,''):v;window.open('/'+p,'_blank')}}
document.getElementById('domainInput').addEventListener('keydown',function(e){if(e.key==='Enter')go()});

// ===== 鼠标跟随 tooltip =====
(function(){
  var trigger=document.querySelector('.tooltip-trigger');
  var tip=trigger&&trigger.querySelector('.tooltip-text');
  if(!trigger||!tip)return;
  var timer=null;
  trigger.addEventListener('mouseenter',function(e){
    clearTimeout(timer);
    tip.classList.add('show');
    positionTip(e);
  });
  trigger.addEventListener('mousemove',function(e){
    positionTip(e);
  });
  trigger.addEventListener('mouseleave',function(){
    timer=setTimeout(function(){tip.classList.remove('show');},80);
  });
  function positionTip(e){
    var x=e.clientX,y=e.clientY;
    var w=tip.offsetWidth,h=tip.offsetHeight;
    var left=x-w/2,top=y-h-12;
    // 边界修正
    if(left<6)left=6;
    if(left+w>window.innerWidth-6)left=window.innerWidth-w-6;
    if(top<6)top=y+12;
    tip.style.left=left+'px';
    tip.style.top=top+'px';
  }
})();

// ===== AI 按钮极光特效 (AuroraEngine) =====
(function() {
  'use strict';

  function prefersReducedMotion() {
    return window.matchMedia && (
      window.matchMedia('(prefers-reduced-motion)').matches ||
      window.matchMedia('(prefers-reduced-motion: reduce)').matches
    );
  }

  class AuroraEngine {
    constructor(containerEl, gradientEl, blurEl, softBlur = false) {
      this.container = containerEl;
      this.gradient = gradientEl;
      this.blur = blurEl;
      this.softBlur = softBlur;
      this.animations = [];
      this.entered = false;
      this.maskAngle = 0;
      this.gradAngle = 0;
      this.targetAngle = 0;
      this.velocity = 0;
      this.tracking = false;
      this.rafId = 0;
      this.trackEl = null;
      this.bounds = null;
      this.fadeAnim = null;
      this.intensityX = 7;
      this.intensityY = 1.5;

      this._onMouseMove = (e) => {
        if (this.bounds) {
          this._updateAngle(e.clientX, e.clientY, this.bounds, this.intensityX, this.intensityY);
        }
      };
    }

    _updateAngle(clientX, clientY, bounds, intX, intY) {
      this.targetAngle = 180 / Math.PI * Math.atan2(
        (clientY - (bounds.top + bounds.height / 2)) / intY,
        (clientX - (bounds.left + bounds.width / 2)) / intX
      );
    }

    _animationLoop() {
      if (!this.tracking) return;
      const diff = (this.targetAngle - this.maskAngle) % 360;
      this.velocity += (2 * diff % 360 - diff) * 0.05;
      this.velocity *= 0.75;
      this.maskAngle += this.velocity;
      const gradDiff = (this.maskAngle - this.gradAngle) % 360;
      const t = Math.pow(Math.min(Math.abs(2 * gradDiff % 360 - gradDiff) / 90, 1), 3);
      this.gradAngle = this._lerpAngle(this.gradAngle, this.maskAngle, t);
      if (this.gradient) {
        this.gradient.style.setProperty('--q9niGe', this.maskAngle + -167 + 'deg');
        this.gradient.style.setProperty('--cqcjz', this.gradAngle + -142 + 'deg');
      }
      this.rafId = requestAnimationFrame(() => this._animationLoop());
    }

    _lerpAngle(from, to, t) {
      const diff = (to - from) % 360;
      return from + (2 * diff % 360 - diff) * t;
    }

    playEntry(animate, duration) {
      if (animate === void 0) animate = true;
      if (duration === void 0) duration = 650;
      if (!this.container || prefersReducedMotion()) return;
      const isFirstEntry = !this.entered && animate;
      this.entered = animate;
      if (isFirstEntry) {
        this.cancel();
        try {
          if (typeof CSS !== 'undefined' && CSS.registerProperty) {
            CSS.registerProperty({ name: '--q9niGe', syntax: '<angle>', inherits: true, initialValue: '0deg' });
            CSS.registerProperty({ name: '--cqcjz', syntax: '<angle>', inherits: true, initialValue: '0deg' });
          }
        } catch(e) {}
        if (this.gradient && this.blur && animate) {
          const opacityAnim = this.gradient.animate([
            { opacity: 0, easing: 'cubic-bezier(0, 0, 0, 1)', offset: 0 },
            { opacity: 1, offset: 0.25 },
            { opacity: 1, easing: 'cubic-bezier(0.30, 0.00, 0.80, 0.15)', offset: 0.5 },
            { opacity: 0, offset: 1 }
          ], { duration: duration, fill: 'both' });
          const blurFrames = this.softBlur
            ? [{ filter: 'blur(1px)' }, { filter: 'blur(5px)', offset: 0.15 }, { filter: 'blur(3px)', offset: 0.25 }, { filter: 'blur(5px)', offset: 0.45 }, { filter: 'blur(1px)' }]
            : [{ filter: 'blur(1px)' }, { filter: 'blur(20px)', offset: 0.15 }, { filter: 'blur(5px)', offset: 0.25 }, { filter: 'blur(7px)', offset: 0.45 }, { filter: 'blur(1px)' }];
          const blurAnim = this.blur.animate(blurFrames, { duration: duration, fill: 'both', easing: 'linear' });
          const angleAnim = this.gradient.animate([
            { '--q9niGe': '-90deg', '--cqcjz': '170deg', easing: 'cubic-bezier(0, 0, 0, 1)' },
            { '--q9niGe': '200deg', '--cqcjz': '225deg' }
          ], { duration: duration, fill: 'both' });
          this.animations.push(opacityAnim, blurAnim, angleAnim);
          for (const anim of this.animations) {
            anim.playbackRate = 1;
            anim.play();
          }
        }
      } else if (!animate) {
        this.cancel();
      }
    }

    cancel() {
      for (const anim of this.animations) anim.cancel();
      this.animations.length = 0;
    }

    startTracking(element, intX, intY) {
      if (intX === void 0) intX = 7;
      if (intY === void 0) intY = 1.5;
      if (!this.gradient) return;
      this.trackEl = element;
      this.intensityX = intX;
      this.intensityY = intY;
      this.bounds = element.getBoundingClientRect();
      this.tracking = true;
      this.velocity = 0;
      this.cancel();
      if (this.fadeAnim) this.fadeAnim.cancel();
      this.fadeAnim = this.gradient.animate([{ opacity: 1 }], { duration: 350, fill: 'forwards' });
      element.addEventListener('mousemove', this._onMouseMove);
      if (!this.rafId) this._animationLoop();
    }

    stopTracking() {
      if (!this.gradient) return;
      this.tracking = false;
      this.velocity = 0;
      if (this.fadeAnim) this.fadeAnim.cancel();
      this.fadeAnim = this.gradient.animate(
        [{ opacity: 1 }, { opacity: 0 }],
        { duration: 350, fill: 'forwards' }
      );
      if (this.trackEl) {
        this.trackEl.removeEventListener('mousemove', this._onMouseMove);
        this.trackEl = null;
      }
      this.bounds = null;
      if (this.rafId) {
        cancelAnimationFrame(this.rafId);
        this.rafId = 0;
      }
    }
  }

  // ===== 初始化按钮 =====
  const btn = document.getElementById('aiBtn');
  if (!btn) return;

  const auroraContainer = btn.querySelector('[jsname="IVmF1e"]');
  const auroraGradient = btn.querySelector('[jsname="HQj0A"]');
  const auroraBlur = btn.querySelector('[jsname="JoEfzc"]');

  if (!auroraContainer || !auroraGradient || !auroraBlur) return;

  const aurora = new AuroraEngine(auroraContainer, auroraGradient, auroraBlur, true);

  auroraContainer.style.setProperty('--BgHDjb', '100px');
  auroraContainer.style.setProperty('--bFlrOb', '4px');
  auroraContainer.style.setProperty('--HM63Tc', '-1px');
  auroraContainer.style.setProperty('--sjdAce', '4');
  auroraContainer.style.setProperty('--mWus4b', '1.5');

  aurora.playEntry(true, 1000);
  btn.classList.add('HYcHq');
  setTimeout(function() { btn.classList.remove('HYcHq'); }, 1000);

  let auroraEnabled = true;

  btn.addEventListener('mouseenter', function() {
    if (auroraEnabled) {
      aurora.startTracking(btn, 4, 1.5);
    }
  });

  btn.addEventListener('mouseleave', function() {
    if (auroraEnabled) {
      aurora.stopTracking();
    }
    if (!btn.matches(':hover')) {
      auroraEnabled = true;
      btn.classList.remove('PHjFye');
    }
  });

  btn.addEventListener('click', function() {
    btn.classList.toggle('Sw4CSc');
    btn.classList.toggle('VzUPFe');
    if (btn.classList.contains('Sw4CSc')) {
      auroraEnabled = false;
      aurora.stopTracking();
      btn.classList.add('PHjFye');
    } else {
      auroraEnabled = true;
      btn.classList.remove('PHjFye');
      aurora.playEntry(true, 650);
    }
    // 执行代理搜索
    aiSearch();
  });

  console.log('加速按钮特效已启动 \u2713');
})();
</script>
<script>
(function(){
  'use strict';
  // ===== 红白机风格贪吃蛇 =====
  var c=document.createElement('canvas');
  c.id='snakeCanvas';
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  document.body.appendChild(c);
  var ctx=c.getContext('2d');
  
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  
  var CELL=14,SPEED=500,BODY_LEN=5;
  var mx=c.width/2,my=c.height/2,mouseIn=false,mouseMoved=false,eaten=false;
  var headX=Math.floor(c.width/2/CELL)*CELL;
  var headY=Math.floor(c.height/2/CELL)*CELL;
  var trail=[],dirX=1,dirY=0,lastMove=0,wanderSteps=0,targetX=0,targetY=0;
  
  // 吃鼠标遮罩
  var blocker=document.createElement('div');
  blocker.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;cursor:none;display:none';
  document.body.appendChild(blocker);
  
  for(var i=0;i<BODY_LEN;i++)trail.push({x:headX-i*CELL,y:headY});
  
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;mouseIn=true;mouseMoved=true});
  document.addEventListener('mouseleave',function(){mouseIn=false;if(eaten){eaten=false;blocker.style.display='none';document.body.style.cursor=''}});
  
  function loop(now){
    ctx.clearRect(0,0,c.width,c.height);
    
    // 方向决策
    if(mouseIn&&mouseMoved&&!eaten){
      // 追鼠标
      var dx=mx-headX,dy=my-headY;
      if(Math.abs(dx)>Math.abs(dy)){
        if(dx>0&&dirX!==-1){dirX=1;dirY=0}
        else if(dx<0&&dirX!==1){dirX=-1;dirY=0}
        else if(dy>0&&dirY!==-1){dirX=0;dirY=1}
        else if(dy<0&&dirY!==1){dirX=0;dirY=-1}
      }else{
        if(dy>0&&dirY!==-1){dirX=0;dirY=1}
        else if(dy<0&&dirY!==1){dirX=0;dirY=-1}
        else if(dx>0&&dirX!==-1){dirX=1;dirY=0}
        else if(dx<0&&dirX!==1){dirX=-1;dirY=0}
      }
    }else{
      // 随机游荡：往一个目标点直线走，到了再换目标
      var tx=targetX-headX,ty=targetY-headY;
      if(Math.abs(tx)<CELL&&Math.abs(ty)<CELL||wanderSteps<=0){
        targetX=Math.floor(Math.random()*(c.width-CELL)/CELL)*CELL;
        targetY=Math.floor(Math.random()*(c.height-CELL)/CELL)*CELL;
        wanderSteps=8+Math.floor(Math.random()*16);
      }
      var dx2=targetX-headX,dy2=targetY-headY;
      if(Math.abs(dx2)>Math.abs(dy2)){
        if(dx2>0&&dirX!==-1){dirX=1;dirY=0}
        else if(dx2<0&&dirX!==1){dirX=-1;dirY=0}
        else if(dy2>0&&dirY!==-1){dirX=0;dirY=1}
        else if(dy2<0&&dirY!==1){dirX=0;dirY=-1}
      }else{
        if(dy2>0&&dirY!==-1){dirX=0;dirY=1}
        else if(dy2<0&&dirY!==1){dirX=0;dirY=-1}
        else if(dx2>0&&dirX!==-1){dirX=1;dirY=0}
        else if(dx2<0&&dirX!==1){dirX=-1;dirY=0}
      }
    }
    
    // 定时步进
    if(now-lastMove>SPEED){
      lastMove=now;
      if(!mouseIn)wanderSteps--;
      headX+=dirX*CELL;headY+=dirY*CELL;
      if(headX<0){headX=c.width-CELL;if(!mouseIn)wanderSteps=0}
      if(headX>=c.width){headX=0;if(!mouseIn)wanderSteps=0}
      if(headY<0){headY=c.height-CELL;if(!mouseIn)wanderSteps=0}
      if(headY>=c.height){headY=0;if(!mouseIn)wanderSteps=0}
      trail.unshift({x:headX,y:headY});
      if(trail.length>BODY_LEN+10)trail.pop();
      // 检查是否吃到鼠标（仅一次）
      if(mouseIn&&!eaten&&Math.abs(headX-mx)<CELL&&Math.abs(headY-my)<CELL){
        eaten=true;
        blocker.style.display='block';
        document.body.style.cursor='none';
      }
    }
    
    // 画身体
    var drawLen=Math.min(trail.length,BODY_LEN);
    for(var i=drawLen-1;i>=1;i--){
      var s=trail[i],pad=2;
      ctx.fillStyle='rgba(0,0,0,'+(1-(i/drawLen)*0.5)+')';
      ctx.fillRect(s.x+pad,s.y+pad,CELL-pad*2,CELL-pad*2);
    }
    
    // 画蛇头
    var h=trail[0];
    if(h){
      ctx.fillStyle='#000';
      ctx.fillRect(h.x+2,h.y+2,CELL-4,CELL-4);
    }
    
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
